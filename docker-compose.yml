services:
  adminarr:
    container_name: adminarr
    build: .
    image: ghcr.io/plexd281knilb/adminarr:latest
    restart: unless-stopped
    user: root  # <--- THIS IS REQUIRED TO FIX THE DB LOCK
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env  # <--- This automatically pulls in your ARRAY, PLEX, and TDARR variables
    environment:
      # Keep these here! The compose file overrides the .env file.
      # Your .env says "./dev.db", but the container needs "/app/data/dev.db"
      - DATABASE_URL=file:/app/data/dev.db
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - /mnt/user:/mnt/user
      - /mnt/remotes:/mnt/remotes